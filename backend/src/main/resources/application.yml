spring:
  datasource:
    url: ${SUPABASE_URL}
    username: postgres
    password: ${SUPABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: 0570b4b2eb2a0e303b2b7e4cd82a4c2dfb3f5b1f82ade957384e97e219b187d2
    expiration: 86400000
  supabase:
    anon-key: ${SUPABASE_ANON_KEY:your-supabase-anon-key-here}